  <script>
    /**
     * Function handles the click event on a card
     * @param {string} id - The ID of the card
     * @returns {void}
     */
    function cardclick(id) {
      const key = "THRESHOLD_TRIGGERS";
      const data = JSON.parse(sessionStorage.getItem(key)) || {};
      // remove id from session storage since it was clicked
      delete data[id];

      sessionStorage.setItem(key, JSON.stringify(data));
      localStorage.setItem("patient_unique_id", id);
      location.replace("index.html?openpage=livecomponents");
    }
  </script>
