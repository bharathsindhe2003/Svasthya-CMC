<!doctype html>
<html lang="en">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <!-- Meta, title, CSS, favicons, etc. -->
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="images/svasthyaicon2.ico" type="image/ico" />
    <title>Svasthya | Context Assesment</title>
    <!-- Bootstrap -->
    <link href="../vendors/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Font Awesome -->
    <link href="../vendors/font-awesome/css/font-awesome.min.css" rel="stylesheet" />
    <!-- NProgress -->
    <link href="../vendors/nprogress/nprogress.css" rel="stylesheet" />
    <!-- iCheck -->
    <link href="../vendors/iCheck/skins/flat/green.css" rel="stylesheet" />
    <link href="../build/css/lightbox.css" rel="stylesheet" />
    <!-- bootstrap-progressbar -->
    <link href="../vendors/bootstrap-progressbar/css/bootstrap-progressbar-3.3.4.min.css" rel="stylesheet" />
    <!-- JQVMap -->
    <link href="../vendors/jqvmap/dist/jqvmap.min.css" rel="stylesheet" />
    <!-- bootstrap-daterangepicker -->
    <link href="../vendors/bootstrap-daterangepicker/daterangepicker.css" rel="stylesheet" />
    <!-- Custom Theme Style -->
    <link href="../build/css/context_assment_LeftandTopNavigation.css" rel="stylesheet" />
    <link href="../build/css/context_assment_LiveRightColomn.css?v=0.1.10" rel="stylesheet" />
  </head>
  <body class="nav-md">
    <div class="container body">
      <div class="main_container">
        <div id="loader"></div>
      </div>
      <div class="right_col context-page context-assessment-page" role="main">
        <div class="LiveSpecification">
          <div class="context-shell">
            <div class="context-monitor-layout">
              <section class="context-chart-column" aria-label="Context waveform charts">
                <article class="context-wave-card">
                  <div class="context-wave-card__header">
                    <div>
                      <p id="ContextSymptomName" class="context-section-kicker"></p>
                      <h2>Electrocardiogram (ECG)</h2>
                    </div>
                    <div class="context-wave-card__meta">
                      <span>ECG Date: <label id="contextecgdate"></label></span>
                      <span>ECG Time: <label id="contextecgtime"></label></span>
                    </div>
                  </div>
                  <div class="x_panel context-chart-panel">
                    <div class="x_content">
                      <div id="context_ecg"></div>
                    </div>
                  </div>
                </article>

                <article class="context-wave-card">
                  <div class="context-wave-card__header">
                    <h2>Photoplethysmogram (PPG)</h2>
                    <div class="context-wave-card__meta">
                      <span>PPG Date: <label id="contextppgdate"></label></span>
                      <span>PPG Time: <label id="contextppgtime"></label></span>
                    </div>
                  </div>
                  <div class="x_panel context-chart-panel">
                    <div class="x_content">
                      <div id="context_ppg"></div>
                    </div>
                  </div>
                </article>

                <article class="context-wave-card">
                  <div class="context-wave-card__header">
                    <h2>Respiratory Rate (RR)</h2>
                    <div class="context-wave-card__meta">
                      <span>RR Date: <label id="contextrrdate"></label></span>
                      <span>RR Time: <label id="contextrrtime"></label></span>
                    </div>
                  </div>
                  <div class="x_panel context-chart-panel">
                    <div class="x_content">
                      <div id="context_rr"></div>
                    </div>
                  </div>
                </article>
              </section>

              <aside class="context-side-column" aria-label="Context details and vital signs">
                <!-- <section class="context-details-surface"> -->
                <!-- <div class="context-details-surface__header">
                    <h2>Alert Context</h2>
                  </div> -->
                <div class="context-ews-slot">
                  <div id="context_ews_id" class="ews_card_js">
                    <div class="ews_card">
                      <div class="animated flipInY col-lg-12 col-md-12 col-sm-12">
                        <div id="context_ews_color1" class="ews_bar">
                          <p class="ews_no" id="context_ews_id1"></p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <div class="context-symptoms" id="symtoms"></div>
                <!-- </section> -->

                <section class="context-vitals-surface">
                  <div class="context-vitals-surface__header">
                    <h2>Vitals</h2>
                    <div class="context-vitals-surface__meta">
                      <span>Vital Date: <label id="contextsensordate"></label></span>
                      <span>Vital Time: <label id="contextsensortime"></label></span>
                    </div>
                  </div>

                  <div class="context-vitals-grid">
                    <article class="context-vital-card">
                      <div class="context-vital-card__chart">
                        <div id="ContextHeartRateId" class="echartsgauges1"></div>
                      </div>
                      <h4 class="name_title">Heart Rate</h4>
                    </article>

                    <article class="context-vital-card">
                      <div class="context-vital-card__chart">
                        <div id="ContextBloodOxygenId" class="echartsgauges1"></div>
                      </div>
                      <h4 class="name_title">Blood Oxygen</h4>
                    </article>

                    <article class="context-vital-card">
                      <div class="context-vital-card__chart">
                        <div id="ContextTemperatureId" class="echartsgauges1"></div>
                      </div>
                      <h4 class="name_title">Temperature</h4>
                    </article>

                    <article class="context-vital-card">
                      <div class="context-vital-card__chart">
                        <div id="ContextBloodPressureId" class="echartsgauges1"></div>
                      </div>
                      <h4 class="name_title">Blood Pressure</h4>
                    </article>

                    <article class="context-vital-card context-vital-card--full">
                      <div class="context-vital-card__chart">
                        <div id="ContextRespirationRateId" class="echartsgauges1"></div>
                      </div>
                      <h4 class="name_title">Respiration Rate</h4>
                    </article>
                  </div>
                </section>
              </aside>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="lightboxcontext">
      <div id="lightboxcontainercontext"></div>
      <div id="closebuttoncontext">&times;</div>
    </div>
    <!-- jQuery -->
    <script src="../vendors/jquery/dist/jquery.min.js"></script>
    <!-- Bootstrap -->
    <script src="../vendors/bootstrap/dist/js/bootstrap.min.js"></script>
    <!-- FastClick -->
    <script src="../vendors/fastclick/lib/fastclick.js"></script>
    <!-- NProgress -->
    <script src="../vendors/nprogress/nprogress.js"></script>
    <!-- Chart.js -->
    <script src="../vendors/Chart.js/dist/Chart.min.js"></script>
    <!-- gauge.js -->
    <script src="../vendors/gauge.js/dist/gauge.min.js"></script>
    <!-- bootstrap-progressbar -->
    <script src="../vendors/bootstrap-progressbar/bootstrap-progressbar.min.js"></script>
    <!-- iCheck -->
    <script src="../vendors/iCheck/icheck.min.js"></script>
    <!-- Skycons -->
    <script src="../vendors/skycons/skycons.js"></script>
    <!-- Flot -->
    <script src="../vendors/Flot/jquery.flot.js"></script>
    <script src="../vendors/Flot/jquery.flot.pie.js"></script>
    <script src="../vendors/Flot/jquery.flot.time.js"></script>
    <script src="../vendors/Flot/jquery.flot.stack.js"></script>
    <script src="../vendors/Flot/jquery.flot.resize.js"></script>
    <!-- Flot plugins -->
    <script src="../vendors/flot.orderbars/js/jquery.flot.orderBars.js"></script>
    <script src="../vendors/flot-spline/js/jquery.flot.spline.min.js"></script>
    <script src="../vendors/flot.curvedlines/curvedLines.js"></script>
    <!-- DateJS -->
    <script src="../vendors/DateJS/build/date.js"></script>
    <!-- JQVMap -->
    <script src="../vendors/jqvmap/dist/jquery.vmap.js"></script>
    <script src="../vendors/jqvmap/examples/js/jquery.vmap.sampledata.js"></script>
    <!-- bootstrap-daterangepicker -->
    <script src="../vendors/moment/min/moment.min.js"></script>
    <script src="../vendors/bootstrap-daterangepicker/daterangepicker.js"></script>
    <script src="../vendors/echarts/dist/echarts.min.js"></script>
    <script src="../vendors/jquery-sparkline/dist/jquery.sparkline.min.js"></script>
    <!-- Custom Theme Scripts -->
    <script type="module" src="../build/js/context_assessment/context_assessment_UI.js"></script>
    <script type="module" src="../build/js/LeftandTopNavigation/LeftandTopNavigation.js"></script>
    <!-- easy-pie-chart -->
    <script src="../vendors/jquery.easy-pie-chart/dist/jquery.easypiechart.min.js"></script>
    <!-- TODO: Add SDKs for Firebase products that you want to use
	  https://firebase.google.com/docs/web/setup#available-libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.6.2/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.2/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.2/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.2/firebase-analytics.js"></script>
  </body>
</html>
