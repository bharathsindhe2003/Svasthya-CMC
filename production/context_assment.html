      <div class="right_col" role="main">
        <div class="LiveSpecification">
          <div class="Live_context_assessment">
            <p id="ContextSymptomName"></p>
          </div>
          <!-- Ews card -->
          <!-- Ews card -->
          <div class="col-md-12 col-sm-12 col-xs-12">
            <div id="ews_id" class="ews_card_js">
              <div class="ews_card">
                <div class="animated flipInY col-lg-12 col-md-12 col-sm-12">
                  <div id="ews_color1" class="ews_bar" style="padding-top: 5px">
                    <p class="ews_no" id="ews_id1"></p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- /Ews card -->

          <div class="symtoms" id="symtoms"></div>

          <div class="container" style="display: flex; width: 100%; gap: 1rem; padding-bottom: 2rem; padding-left: 2rem; padding-right: 2rem; flex-direction: row; margin-bottom: 5rem">
            <!-- Left: Big charts 70% -->
            <div class="big-charts" style="flex: 0 0 70%; display: flex; flex-direction: column; gap: 1rem">
              <!-- Top row: ECG Date/Time -->
              <div class="ecg_timestamp" style="display: flex; align-items: center; margin-bottom: 1rem">
                <span>ECG Date: <label id="contextecgdate"></label></span>
                <span style="margin: 0 1.5rem"></span>
                <span>ECG Time: <label id="contextecgtime"></label></span>
              </div>
              <!-- ECG -->
              <div class="x_panel">
                <div class="x_title">
                  <h2>Electrocardiogram (ECG)</h2>
                  <div class="clearfix"></div>
                </div>
                <div class="x_content"><div id="context_ecg" style="width: 100%; height: 200px"></div></div>
              </div>
              <!-- PPG -->
              <!-- Hidden on initial load; shown via JS only for page == "1" -->
              <div class="ppg_timstamp" style="align-items: center; margin-bottom: 0.5rem">
                <span>PPG Date: <label id="contextppgdate"></label></span>
                <span style="margin: 0 1.5rem"></span>
                <span>PPG Time: <label id="contextppgtime"></label></span>
              </div>
              <div class="x_panel ppg_context">
                <div class="x_title ppg_context_title">
                  <h2>Photoplethysmogram (PPG)</h2>
                  <div class="clearfix"></div>
                </div>
                <!-- Added Date/Time Row -->
                <div class="x_content">
                  <div id="context_ppg" style="width: 100%; height: 200px"></div>
                </div>
              </div>
              <div class="rr_timestamp" style="align-items: center; margin-bottom: 0.5rem">
                <span>RR Date: <label id="contextrrdate"></label></span>
                <span style="margin: 0 1.5rem"></span>
                <span>RR Time: <label id="contextrrtime"></label></span>
              </div>
              <div class="x_panel">
                <div class="x_title">
                  <h2>Respiratory Rate (RR)</h2>
                  <div class="clearfix"></div>
                </div>
                <!-- Added Date/Time Row -->
                <div class="x_content">
                  <div id="context_rr" style="width: 100%; height: 200px"></div>
                </div>
              </div>
            </div>

            <!-- Right: Small gauges 30% -->
            <!-- Hidden on initial load; shown via JS only for page == "1" -->
            <div class="small-gauges" style="flex: 0 0 30%; flex-direction: column">
              <!-- Top row: Sensor Date/Time -->
              <div style="display: flex; align-items: center; justify-content: flex-end; margin-bottom: 1rem; margin-right: 2rem">
                <span>Vital Date: <label id="contextsensordate"></label></span>
                <span style="margin: 0 1.5rem"></span>
                <span>Vital Time: <label id="contextsensortime"></label></span>
              </div>
              <!-- 2x3 grid for gauges -->
              <div style="display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(3, 1fr); gap: 1rem; height: 100%">
                <!-- Blood Oxygen -->
                <div class="x_panel ui-ribbon-container fixed_height_310" style="padding: 5px">
                  <div class="x_content" style="display: flex; flex-direction: column; align-items: center; height: 90%">
                    <div id="ContextBloodOxygenId" class="echartsgauges1" style="width: 100%; height: 100%"></div>
                    <div style="display: flex; align-items: center; margin-top: 2px">
                      <h4 class="name_title" style="color: #fff; margin: 0 12px 0 0; font-weight: 600">Blood Oxygen</h4>
                    </div>
                  </div>
                </div>
                <!-- Heart Rate -->
                <div class="x_panel ui-ribbon-container fixed_height_310">
                  <div class="x_content" style="display: flex; flex-direction: column; align-items: center; height: 90%">
                    <div id="ContextHeartRateId" class="echartsgauges1" style="width: 100%; height: 100%"></div>
                    <div style="display: flex; align-items: center; margin-top: 2px">
                      <h4 class="name_title" style="color: #fff; margin: 0 12px 0 0; font-weight: 600">Heart Rate</h4>
                    </div>
                  </div>
                </div>
                <!-- Temperature -->
                <div class="x_panel ui-ribbon-container fixed_height_310" style="padding: 5px">
                  <div class="x_content" style="display: flex; flex-direction: column; align-items: center; height: 90%">
                    <div id="ContextTemperatureId" class="echartsgauges1" style="width: 100%; height: 100%"></div>
                    <div style="display: flex; align-items: center; margin-top: 2px">
                      <h4 class="name_title" style="color: #fff; margin: 0 12px 0 0; font-weight: 600">Temperature</h4>
                    </div>
                  </div>
                </div>
                <!-- Activity -->
                <div class="x_panel ui-ribbon-container fixed_height_310" style="padding: 5px">
                  <div class="x_content" style="display: flex; flex-direction: column; align-items: center; height: 90%">
                    <div id="ContextAccelrationId" class="echartsgauges1" style="width: 100%; height: 100%"></div>
                    <div style="display: flex; align-items: center; margin-top: 2px">
                      <h4 class="name_title" style="color: #fff; margin: 0; font-weight: 600">Activity</h4>
                    </div>
                  </div>
                </div>
                <!-- Blood Pressure -->
                <div class="x_panel ui-ribbon-container fixed_height_310" style="padding: 5px">
                  <div class="x_content" style="display: flex; flex-direction: column; align-items: center; height: 90%">
                    <div id="ContextBloodPressureId" class="echartsgauges1" style="width: 100%; height: 100%"></div>
                    <div style="display: flex; align-items: center; margin-top: 2px">
                      <h4 class="name_title" style="color: #fff; margin: 0 12px 0 0; font-weight: 600">Blood Pressure</h4>
                    </div>
                  </div>
                </div>
                <!-- Respiration Rate -->
                <div class="x_panel ui-ribbon-container fixed_height_310" style="padding: 5px">
                  <div class="x_content" style="display: flex; flex-direction: column; align-items: center; height: 90%">
                    <div id="ContextRespirationRateId" class="echartsgauges1" style="width: 100%; height: 100%"></div>
                    <div style="display: flex; align-items: center; margin-top: 2px">
                      <h4 class="name_title" style="color: #fff; margin: 0; font-weight: 600">Respiration Rate</h4>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
